<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      #container {
        display: flex;
        width: 2000px;
        margin: 50px auto;
        gap: 10px;
      }
      .box{
        border: 1px solid #222;
        width: 300px;
        height: 300px;
        flex: 1;
        /* background: url(images/KakaoTalk_20260318_100541335_02.jpg) no-repeat left top; */
        background: url(images/KakaoTalk_20260318_100541335_02.jpg) no-repeat center;
      }
      .container{
        display: flex;
        width: 2000px;
        margin: 50px auto;
        gap: 10px;
      }
      .box-{
        border: 1px solid #222;
        width: 300px;
        height: 300px;
        flex: 1;
      }
      #bg1{
        background-size: auto;  /* 원래 배경 이미지 크기로 표시  */
      }
      #bg2{
        background-size: 200px;  /* 너비는 200px , 높이는 자동 계산 */
      }
      #bg3{
        background-size: 50%;  /* 너비는 부모의 50% , 높이는 자동 계산 */
      }
      #bg4{
        background-size: 100% 100%;  /* 너비는 부모의 100% , 높이 100% */
      }
      #bg5{
        background-size: contain;  /* 요소안에 배경 이미지가 다 보이도록 표시 */
      }
      #bg5{
        background-size: cover;  /* 요소를 다 덮도록 배경 이미지 표시  */
      }
    </style>
  </head>
  <body>
    <div id="container">
      <div class="box" id="bg1"></div>
      <div class="box" id="bg2"></div>
      <div class="box" id="bg3"></div>
      <div class="box" id="bg4"></div>
      <div class="box" id="bg5"></div>
      <div class="box" id="bg6"></div>
    </div>
    <!-- 혼자 연습 -->
    <div class="container">
        <div class="box-" id="bg-1"></div>
        <div class="box-" id="bg-2"></div>
        <div class="box-" id="bg-3"></div>
        <div class="box-" id="bg-4"></div>
        <div class="box-" id="bg-5"></div>
    </div>
  </body>
</html>
